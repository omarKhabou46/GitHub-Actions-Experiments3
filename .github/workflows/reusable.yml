name: Reusable Workflow
on: 
  workflow_call:
    inputs: 
      artifact-name: 
        description: "build artifact"
        required: false
        default: dist
        type: string 

jobs:  
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: deploy
        run: echo "hi hi deploying"
      - name: download artifact
        uses: actions/download-artifact@v4
        with: 
          name: ${{ inputs.artifact-name }}
    